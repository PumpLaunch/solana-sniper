services:
  - type: web
    name: solbot-pro
    env: node
    plan: free                  # ou starter si tu veux plus de RAM
    buildCommand: npm install
    startCommand: node bot.js
    envVars:
      - key: PRIVATE_KEY
        sync: false
      - key: HELIUS_API_KEY
        sync: false
      - key: API_KEY
        generateValue: true     # Render génère une clé forte automatiquement
      - key: WEBHOOK_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: TOKEN_ACCOUNT_CACHE_CYCLES
        value: 10
      - key: PRICE_PREFETCH_CONCURRENCY
        value: 8
      - key: PERSIST_DEBOUNCE_MS
        value: 30000
      - key: WS_PING_INTERVAL_MS
        value: 55000
    autoDeploy: true
