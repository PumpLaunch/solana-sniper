<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🤖 SolBot Pro — Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #ffffff;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      padding: 30px 0;
      border-bottom: 2px solid #0f3460;
      margin-bottom: 30px;
    }

    header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      color: #a0a0a0;
      font-size: 1.1em;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: rgba(15, 52, 96, 0.5);
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      border: 1px solid #0f3460;
    }

    .stat-card h3 {
      color: #a0a0a0;
      font-size: 0.9em;
      margin-bottom: 10px;
    }

    .stat-card .value {
      font-size: 1.8em;
      font-weight: bold;
      color: #00d9ff;
    }

    .tokens-table {
      background: rgba(15, 52, 96, 0.3);
      border-radius: 15px;
      padding: 20px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: rgba(0, 217, 255, 0.2);
      padding: 15px;
      text-align: left;
      font-weight: 600;
      color: #00d9ff;
      border-radius: 8px;
    }

    td {
      padding: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    tr:hover {
      background: rgba(0, 217, 255, 0.1);
    }

    .token-name {
      font-weight: bold;
      color: #ffffff;
    }

    .token-address {
      font-family: 'Courier New', monospace;
      font-size: 0.85em;
      color: #a0a0a0;
      background: rgba(0, 0, 0, 0.3);
      padding: 4px 8px;
      border-radius: 4px;
      display: inline-block;
      margin-top: 5px;
    }

    .pnl-positive {
      color: #00ff88;
      font-weight: bold;
    }

    .pnl-negative {
      color: #ff4757;
      font-weight: bold;
    }

    .status {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.85em;
      font-weight: 600;
    }

    .status-live {
      background: rgba(0, 255, 136, 0.2);
      color: #00ff88;
    }

    .status-offline {
      background: rgba(255, 71, 87, 0.2);
      color: #ff4757;
    }

    .refresh-btn {
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      border: none;
      padding: 12px 30px;
      border-radius: 25px;
      color: #1a1a2e;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
      transition: transform 0.2s;
    }

    .refresh-btn:hover {
      transform: scale(1.05);
    }

    .loading {
      text-align: center;
      padding: 50px;
      color: #a0a0a0;
    }

    .loading-spinner {
      border: 4px solid rgba(0, 217, 255, 0.2);
      border-top: 4px solid #00d9ff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 1.8em;
      }

      .stats {
        grid-template-columns: repeat(2, 1fr);
      }

      table {
        font-size: 0.85em;
      }

      th, td {
        padding: 10px 5px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🤖 SolBot Pro Dashboard</h1>
      <p>Surveillance en temps réel de votre portefeuille Solana</p>
      <p id="wallet-address" style="margin-top: 10px; font-family: monospace; color: #00d9ff;"></p>
      <span id="bot-status" class="status status-offline">🔴 Bot hors ligne</span>
    </header>

    <div class="stats">
      <div class="stat-card">
        <h3>📊 Tokens Surveillés</h3>
        <div class="value" id="total-tokens">-</div>
      </div>
      <div class="stat-card">
        <h3>💰 Valeur Totale</h3>
        <div class="value" id="total-value">-</div>
      </div>
      <div class="stat-card">
        <h3>📈 Meilleur PnL</h3>
        <div class="value" id="best-pnl">-</div>
      </div>
      <div class="stat-card">
        <h3>📉 Pire PnL</h3>
        <div class="value" id="worst-pnl">-</div>
      </div>
    </div>

    <div class="tokens-table">
      <h2 style="margin-bottom: 20px; color: #00d9ff;">🪙 Vos Tokens</h2>
      <div id="loading" class="loading">
        <div class="loading-spinner"></div>
        <p>Chargement des données...</p>
      </div>
      <table id="tokens-table" style="display: none;">
        <thead>
          <tr>
            <th>Token</th>
            <th>Adresse</th>
            <th>Balance</th>
            <th>Prix</th>
            <th>Valeur</th>
            <th>PnL</th>
            <th>Liquidité</th>
          </tr>
        </thead>
        <tbody id="tokens-body">
        </tbody>
      </table>
    </div>

    <div style="text-align: center;">
      <button class="refresh-btn" onclick="loadData()">🔄 Actualiser</button>
      <p style="margin-top: 15px; color: #a0a0a0; font-size: 0.9em;">
        Dernière mise à jour : <span id="last-update">-</span>
      </p>
    </div>
  </div>

  <script>
    // ⚙️ CONFIGURATION
    // Remplacez par l'URL de votre service Render si vous ajoutez une API
    const RENDER_API_URL = ''; // Ex: 'https://solana-sniper.onrender.com/api/tokens'
    
    // 🧪 DONNÉES DE DÉMO (à remplacer par les données réelles du bot)
    const DEMO_DATA = [
      {
        symbol: 'USDC',
        name: 'USD Coin',
        address: 'EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v',
        balance: 5.8810,
        price: 0.001767,
        value: 0.01,
        pnl: 0.00,
        liquidity: 13373373
      },
      {
        symbol: 'SKRb',
        name: 'Unknown',
        address: 'SKRbvo6G...',
        balance: 75.9751,
        price: 0.02494,
        value: 1.89,
        pnl: 0.12,
        liquidity: 658480
      },
      {
        symbol: '???',
        name: 'Unknown',
        address: '67ezHLk8...',
        balance: 830.3463,
        price: 0.003597,
        value: 2.99,
        pnl: -1.80,
        liquidity: 188471
      }
    ];

    // 🔄 Charger les données
    async function loadData() {
      const loading = document.getElementById('loading');
      const table = document.getElementById('tokens-table');
      const tbody = document.getElementById('tokens-body');
      
      loading.style.display = 'block';
      table.style.display = 'none';

      try {
        // Essayer de fetch depuis Render API (si configuré)
        let data = DEMO_DATA;
        
        if (RENDER_API_URL) {
          try {
            const response = await fetch(RENDER_API_URL);
            if (response.ok) {
              data = await response.json();
              document.getElementById('bot-status').className = 'status status-live';
              document.getElementById('bot-status').textContent = '🟢 Bot en ligne';
            }
          } catch (e) {
            console.warn('API Render non disponible, utilisation des données démo');
          }
        }

        // Afficher les données
        displayData(data);
        
        // Mettre à jour l'heure
        document.getElementById('last-update').textContent = new Date().toLocaleTimeString('fr-FR');
        
      } catch (error) {
        console.error('Erreur de chargement:', error);
        loading.innerHTML = '<p style="color: #ff4757;">❌ Erreur de chargement des données</p>';
      }
    }

    // 📊 Afficher les données
    function displayData(data) {
      const loading = document.getElementById('loading');
      const table = document.getElementById('tokens-table');
      const tbody = document.getElementById('tokens-body');
      
      loading.style.display = 'none';
      table.style.display = 'table';
      tbody.innerHTML = '';

      // Stats globales
      const totalValue = data.reduce((sum, t) => sum + t.value, 0);
      const bestPnl = Math.max(...data.map(t => t.pnl));
      const worstPnl = Math.min(...data.map(t => t.pnl));

      document.getElementById('total-tokens').textContent = data.length;
      document.getElementById('total-value').textContent = `$${totalValue.toFixed(2)}`;
      document.getElementById('best-pnl').textContent = `+${bestPnl.toFixed(2)}%`;
      document.getElementById('best-pnl').className = 'value pnl-positive';
      document.getElementById('worst-pnl').textContent = `${worstPnl.toFixed(2)}%`;
      document.getElementById('worst-pnl').className = 'value pnl-negative';

      // Wallet address (démo)
      document.getElementById('wallet-address').textContent = 'Wallet: 9Xpa...qTsX';

      // Lignes du tableau
      data.forEach(token => {
        const row = document.createElement('tr');
        
        const pnlClass = token.pnl >= 0 ? 'pnl-positive' : 'pnl-negative';
        const pnlSign = token.pnl >= 0 ? '+' : '';
        
        row.innerHTML = `
          <td>
            <div class="token-name">${token.symbol}</div>
            <div style="color: #a0a0a0; font-size: 0.9em;">${token.name}</div>
          </td>
          <td>
            <code class="token-address">${token.address}</code>
          </td>
          <td>${token.balance.toFixed(4)}</td>
          <td>$${formatPrice(token.price)}</td>
          <td>$${token.value.toFixed(2)}</td>
          <td class="${pnlClass}">${pnlSign}${token.pnl.toFixed(2)}%</td>
          <td>$${formatLiquidity(token.liquidity)}</td>
        `;
        
        tbody.appendChild(row);
      });
    }

    // 🔧 Formateurs
    function formatPrice(price) {
      if (price < 0.0001) {
        return price.toExponential(4);
      }
      return price.toFixed(6);
    }

    function formatLiquidity(liquidity) {
      if (liquidity >= 1000000) {
        return (liquidity / 1000000).toFixed(2) + 'M';
      }
      if (liquidity >= 1000) {
        return (liquidity / 1000).toFixed(1) + 'K';
      }
      return liquidity.toFixed(0);
    }

    // 🚀 Chargement initial
    loadData();

    // 🔄 Auto-refresh toutes les 30 secondes
    setInterval(loadData, 30000);
  </script>
</body>
</html>
