<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SolBot Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: #475569;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .logo-text {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid var(--success);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--success);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px;
            transition: transform 0.2s;
        }

        .stat-card:active {
            transform: scale(0.98);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-value.positive { color: var(--success); }
        .stat-value.negative { color: var(--danger); }

        /* Portfolio Section */
        .section {
            padding: 16px 20px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-icon {
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-icon:active {
            background: var(--accent);
            transform: scale(0.95);
        }

        /* Portfolio Cards */
        .portfolio-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .token-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }

        .token-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent) 0%, #8b5cf6 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .token-card.active::before {
            opacity: 1;
        }

        .token-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .token-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .token-logo {
            width: 44px;
            height: 44px;
            background: var(--bg-card);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border: 2px solid var(--border);
        }

        .token-details {
            flex: 1;
            min-width: 0;
        }

        .token-symbol {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .token-address {
            font-size: 11px;
            color: var(--text-secondary);
            font-family: monospace;
        }

        .token-price {
            text-align: right;
        }

        .price-value {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .price-change {
            font-size: 13px;
            font-weight: 600;
        }

        .price-change.positive { color: var(--success); }
        .price-change.negative { color: var(--danger); }

        .token-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .token-stat {
            text-align: center;
        }

        .token-stat-label {
            font-size: 10px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .token-stat-value {
            font-size: 14px;
            font-weight: 600;
        }

        .token-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
            color: white;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        /* Floating Action Button */
        .fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 8px 30px var(--accent-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 50;
        }

        .fab:active {
            transform: scale(0.95);
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 calc(12px + env(safe-area-inset-bottom));
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
        }

        .nav-item.active {
            color: var(--accent);
        }

        .nav-icon {
            font-size: 22px;
        }

        .nav-label {
            font-size: 11px;
            font-weight: 600;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            align-items: flex-end;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 24px 24px 0 0;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 24px;
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            background: var(--bg-card);
            border: none;
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
        }

        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .quick-amounts {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 8px;
        }

        .quick-amount {
            padding: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-amount:active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .empty-subtext {
            font-size: 13px;
        }

        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 380px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .token-stats {
                grid-template-columns: 1fr;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-top">
            <div class="logo">
                <div class="logo-icon">🤖</div>
                <div class="logo-text">SolBot Pro</div>
            </div>
            <div class="status-badge">
                <div class="status-dot"></div>
                LIVE
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Portfolio Value</div>
                <div class="stat-value" id="totalValue">$0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">PnL Réalisé</div>
                <div class="stat-value" id="realizedPnl">$0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Win Rate</div>
                <div class="stat-value" id="winRate">0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Trades</div>
                <div class="stat-value" id="totalTrades">0</div>
            </div>
        </div>
    </header>

    <!-- Portfolio Section -->
    <section class="section">
        <div class="section-header">
            <div class="section-title">
                <div class="section-icon">📊</div>
                Portfolio
            </div>
            <button class="btn-icon" onclick="refreshData()">🔄</button>
        </div>
        
        <div class="portfolio-list" id="portfolioList">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>
    </section>

    <!-- Floating Action Button -->
    <button class="fab" onclick="openBuyModal()">+</button>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('portfolio')">
            <div class="nav-icon">📊</div>
            <div class="nav-label">Portfolio</div>
        </div>
        <div class="nav-item" onclick="switchTab('analytics')">
            <div class="nav-icon">📈</div>
            <div class="nav-label">Analytics</div>
        </div>
        <div class="nav-item" onclick="switchTab('config')">
            <div class="nav-icon">⚙️</div>
            <div class="nav-label">Config</div>
        </div>
        <div class="nav-item" onclick="switchTab('history')">
            <div class="nav-icon">📜</div>
            <div class="nav-label">Historique</div>
        </div>
    </nav>

    <!-- Buy Modal -->
    <div class="modal" id="buyModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">🛒 Acheter Token</div>
                <button class="modal-close" onclick="closeBuyModal()">×</button>
            </div>
            
            <div class="form-group">
                <label class="form-label">Token Address</label>
                <input type="text" class="form-input" id="buyTokenAddress" placeholder="Coller l'adresse du token...">
            </div>
            
            <div class="form-group">
                <label class="form-label">Montant (SOL)</label>
                <input type="number" class="form-input" id="buyAmount" placeholder="0.00" step="0.01">
                <div class="quick-amounts">
                    <div class="quick-amount" onclick="setBuyAmount(0.1)">0.1</div>
                    <div class="quick-amount" onclick="setBuyAmount(0.25)">0.25</div>
                    <div class="quick-amount" onclick="setBuyAmount(0.5)">0.5</div>
                    <div class="quick-amount" onclick="setBuyAmount(1)">1</div>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">Slippage</label>
                <select class="form-input" id="buySlippage">
                    <option value="500">0.5%</option>
                    <option value="1000" selected>1%</option>
                    <option value="2000">2%</option>
                    <option value="5000">5%</option>
                </select>
            </div>
            
            <button class="btn btn-primary" onclick="executeBuy()" style="width: 100%; padding: 16px; font-size: 16px;">
                Confirmer l'achat
            </button>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let portfolioData = [];
        let statsData = {};

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            setInterval(loadData, 30000); // Auto-refresh every 30s
        });

        async function loadData() {
            try {
                const [statsRes, portfolioRes] = await Promise.all([
                    fetch(`${API_BASE}/api/stats`),
                    fetch(`${API_BASE}/api/portfolio`)
                ]);
                
                statsData = await statsRes.json();
                portfolioData = await portfolioRes.json();
                
                updateUI();
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        function updateUI() {
            // Update stats
            document.getElementById('totalValue').textContent = `$${(statsData.totalValue || 0).toFixed(2)}`;
            document.getElementById('realizedPnl').textContent = `$${(statsData.pnlStats?.realized || 0).toFixed(2)}`;
            document.getElementById('winRate').textContent = `${statsData.analytics?.winRate || 0}%`;
            document.getElementById('totalTrades').textContent = statsData.analytics?.totalTrades || 0;
            
            // Update portfolio
            const portfolioList = document.getElementById('portfolioList');
            
            if (!portfolioData.tokens || portfolioData.tokens.length === 0) {
                portfolioList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">💎</div>
                        <div class="empty-text">Aucun token</div>
                        <div class="empty-subtext">Votre portfolio est vide</div>
                    </div>
                `;
                return;
            }
            
            portfolioList.innerHTML = portfolioData.tokens.map(token => `
                <div class="token-card ${token.pnl > 0 ? 'active' : ''}">
                    <div class="token-header">
                        <div class="token-info">
                            <div class="token-logo">🪙</div>
                            <div class="token-details">
                                <div class="token-symbol">${token.symbol || token.mint.slice(0, 8)}</div>
                                <div class="token-address">${token.mint.slice(0, 4)}...${token.mint.slice(-4)}</div>
                            </div>
                        </div>
                        <div class="token-price">
                            <div class="price-value">$${(token.price || 0).toFixed(6)}</div>
                            <div class="price-change ${token.pnl >= 0 ? 'positive' : 'negative'}">
                                ${token.pnl >= 0 ? '+' : ''}${(token.pnl || 0).toFixed(2)}%
                            </div>
                        </div>
                    </div>
                    
                    <div class="token-stats">
                        <div class="token-stat">
                            <div class="token-stat-label">Balance</div>
                            <div class="token-stat-value">${(token.balance || 0).toFixed(2)}</div>
                        </div>
                        <div class="token-stat">
                            <div class="token-stat-label">Value</div>
                            <div class="token-stat-value">$${(token.value || 0).toFixed(2)}</div>
                        </div>
                        <div class="token-stat">
                            <div class="token-stat-label">Liquidity</div>
                            <div class="token-stat-value">$${((token.liquidity || 0) / 1000).toFixed(1)}k</div>
                        </div>
                    </div>
                    
                    <div class="token-actions">
                        <button class="btn btn-secondary" onclick="window.open('https://dexscreener.com/solana/${token.mint}', '_blank')">
                            🦎 Dex
                        </button>
                        <button class="btn btn-primary" onclick="openSellModal('${token.mint}')">
                            💰 Sell
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function openBuyModal() {
            document.getElementById('buyModal').classList.add('active');
        }

        function closeBuyModal() {
            document.getElementById('buyModal').classList.remove('active');
        }

        function setBuyAmount(amount) {
            document.getElementById('buyAmount').value = amount;
        }

        async function executeBuy() {
            const mint = document.getElementById('buyTokenAddress').value.trim();
            const solAmount = parseFloat(document.getElementById('buyAmount').value);
            const slippageBps = parseInt(document.getElementById('buySlippage').value);
            
            if (!mint || !solAmount) {
                alert('Veuillez remplir tous les champs');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/buy`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mint, solAmount, slippageBps })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('Achat réussi!');
                    closeBuyModal();
                    loadData();
                } else {
                    alert('Erreur: ' + result.error);
                }
            } catch (error) {
                alert('Erreur: ' + error.message);
            }
        }

        async function executeSell(mint, percent) {
            if (!confirm(`Vendre ${percent}% de cette position?`)) return;
            
            try {
                const response = await fetch(`${API_BASE}/api/sell`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mint, percent, reason: 'MANUAL' })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('Vente réussie!');
                    loadData();
                } else {
                    alert('Erreur: ' + result.error);
                }
            } catch (error) {
                alert('Erreur: ' + error.message);
            }
        }

        function refreshData() {
            loadData();
        }

        function switchTab(tab) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            // TODO: Implement tab switching
            if (tab === 'analytics') {
                alert('Analytics - Coming soon');
            } else if (tab === 'config') {
                alert('Config - Coming soon');
            } else if (tab === 'history') {
                alert('History - Coming soon');
            }
        }

        // Close modal on outside click
        document.getElementById('buyModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('buyModal')) {
                closeBuyModal();
            }
        });
    </script>
