<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SolBot Terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Barlow+Condensed:wght@300;400;500;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-void:    #06060e;
      --bg-deep:    #0c0c1a;
      --bg-panel:   #111125;
      --bg-card:    #16162c;
      --bg-hover:   #1c1c38;
      --line:       rgba(100, 100, 200, 0.12);
      --line-bright: rgba(100, 100, 200, 0.28);

      --cyan:       #00d4ff;
      --cyan-dim:   rgba(0, 212, 255, 0.18);
      --cyan-glow:  rgba(0, 212, 255, 0.06);
      --amber:      #f5a623;
      --amber-dim:  rgba(245, 166, 35, 0.15);
      --green:      #00e68a;
      --green-dim:  rgba(0, 230, 138, 0.12);
      --red:        #ff4466;
      --red-dim:    rgba(255, 68, 102, 0.12);
      --purple:     #a78bfa;

      --text-primary:   #e8e8f5;
      --text-secondary: #8888aa;
      --text-dim:       #44445a;
      --text-accent:    #00d4ff;

      --font-display: 'Barlow Condensed', sans-serif;
      --font-body:    'Barlow', sans-serif;
      --font-mono:    'Space Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--bg-void);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* === SCANLINES OVERLAY === */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.08) 2px,
        rgba(0, 0, 0, 0.08) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* === GRID BACKGROUND === */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 1320px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    /* === CORNER BRACKETS === */
    .bracket {
      position: relative;
    }
    .bracket::before, .bracket::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      border-color: var(--cyan);
      border-style: solid;
    }
    .bracket::before { top: 0; left: 0; border-width: 1px 0 0 1px; }
    .bracket::after  { bottom: 0; right: 0; border-width: 0 1px 1px 0; }

    /* ================================================================
       TOP BAR
    ================================================================ */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 28px;
      gap: 20px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand-title {
      font-family: var(--font-display);
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      line-height: 1;
      color: var(--text-primary);
    }

    .brand-title span {
      color: var(--cyan);
      text-shadow: 0 0 20px var(--cyan), 0 0 40px rgba(0,212,255,0.3);
    }

    .brand-sub {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--text-dim);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .topbar-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }

    .live-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: var(--green);
    }

    .live-dot {
      width: 7px; height: 7px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--green);
      animation: livePulse 1.4s ease-in-out infinite;
    }

    @keyframes livePulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    .wallet-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg-panel);
      border: 1px solid var(--line-bright);
      padding: 8px 14px;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 0.75rem;
    }

    .wallet-label {
      color: var(--text-dim);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .wallet-addr { color: var(--cyan); }

    .copy-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 0.85rem;
      transition: color 0.2s;
      padding: 2px;
    }
    .copy-btn:hover { color: var(--cyan); }

    /* ================================================================
       METRICS ROW
    ================================================================ */
    .metrics-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    .metric-card {
      background: var(--bg-panel);
      border: 1px solid var(--line);
      border-top: 2px solid var(--cyan);
      padding: 20px 20px 18px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s, background 0.3s;
    }

    .metric-card:hover {
      background: var(--bg-card);
      border-color: var(--line-bright);
      border-top-color: var(--cyan);
    }

    .metric-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 60px;
      background: linear-gradient(180deg, var(--cyan-glow), transparent);
      pointer-events: none;
    }

    .metric-card.amber { border-top-color: var(--amber); }
    .metric-card.amber::after { background: linear-gradient(180deg, rgba(245,166,35,0.05), transparent); }
    .metric-card.green { border-top-color: var(--green); }
    .metric-card.green::after { background: linear-gradient(180deg, rgba(0,230,138,0.05), transparent); }
    .metric-card.purple { border-top-color: var(--purple); }
    .metric-card.purple::after { background: linear-gradient(180deg, rgba(167,139,250,0.05), transparent); }

    .metric-label {
      font-family: var(--font-display);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .metric-value {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 6px;
      color: var(--text-primary);
    }

    .metric-value.cyan   { color: var(--cyan); text-shadow: 0 0 15px rgba(0,212,255,0.4); }
    .metric-value.amber  { color: var(--amber); text-shadow: 0 0 15px rgba(245,166,35,0.3); }
    .metric-value.green  { color: var(--green); text-shadow: 0 0 15px rgba(0,230,138,0.3); }
    .metric-value.purple { color: var(--purple); }

    .metric-sub {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    /* ================================================================
       MAIN CONTENT GRID
    ================================================================ */
    .content-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 20px;
    }

    .left-col { display: flex; flex-direction: column; gap: 20px; }
    .right-col { display: flex; flex-direction: column; gap: 20px; }

    /* ================================================================
       PANELS
    ================================================================ */
    .panel {
      background: var(--bg-panel);
      border: 1px solid var(--line);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px 12px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      font-family: var(--font-display);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .panel-title-accent {
      color: var(--cyan);
      margin-right: 8px;
    }

    .panel-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn-refresh {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      background: none;
      border: 1px solid var(--line-bright);
      color: var(--text-secondary);
      padding: 5px 12px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    .btn-refresh:hover {
      border-color: var(--cyan);
      color: var(--cyan);
      background: var(--cyan-dim);
    }

    .count-badge {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      background: var(--cyan-dim);
      color: var(--cyan);
      padding: 3px 8px;
      letter-spacing: 0.05em;
    }

    .panel-body { padding: 16px 20px; }

    /* ================================================================
       TOKEN TABLE
    ================================================================ */
    .token-table { width: 100%; }

    .token-table-head {
      display: grid;
      grid-template-columns: 2fr 1.2fr 1.2fr 1fr 1fr 80px;
      padding: 0 14px 8px;
      gap: 12px;
    }

    .th {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .th.right { text-align: right; }

    .token-rows { display: flex; flex-direction: column; gap: 4px; }

    .token-row {
      display: grid;
      grid-template-columns: 2fr 1.2fr 1.2fr 1fr 1fr 80px;
      gap: 12px;
      padding: 12px 14px;
      background: var(--bg-card);
      border: 1px solid transparent;
      border-left: 2px solid var(--line-bright);
      align-items: center;
      cursor: default;
      transition: all 0.2s;
      animation: rowIn 0.35s ease forwards;
    }

    @keyframes rowIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .token-row:hover {
      border-color: var(--line-bright);
      border-left-color: var(--cyan);
      background: var(--bg-hover);
    }

    .td { font-size: 0.88rem; }
    .td.right { text-align: right; }
    .td.mono { font-family: var(--font-mono); font-size: 0.78rem; }

    .token-name {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.92rem;
      letter-spacing: 0.05em;
      color: var(--text-primary);
    }

    .token-addr {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .pnl-badge {
      display: inline-block;
      padding: 3px 8px;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-weight: 700;
      border-radius: 2px;
      text-align: center;
      min-width: 72px;
    }

    .pnl-pos { background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,230,138,0.25); }
    .pnl-neg { background: var(--red-dim);   color: var(--red);   border: 1px solid rgba(255,68,102,0.25); }
    .pnl-neu { background: var(--bg-deep);   color: var(--text-dim); border: 1px solid var(--line); }

    .price-text { font-family: var(--font-mono); font-size: 0.78rem; color: var(--text-primary); }
    .value-text { font-family: var(--font-mono); font-size: 0.78rem; color: var(--amber); }
    .balance-text { font-family: var(--font-mono); font-size: 0.78rem; color: var(--text-secondary); }

    .tp-mini {
      display: flex;
      gap: 3px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .tp-dot {
      width: 8px; height: 8px;
      border-radius: 1px;
    }
    .tp-dot.done { background: var(--green); box-shadow: 0 0 4px var(--green); }
    .tp-dot.wait { background: var(--line-bright); border: 1px solid var(--text-dim); }

    /* ================================================================
       TAKE-PROFIT PANEL
    ================================================================ */
    .tp-entries { display: flex; flex-direction: column; gap: 10px; }

    .tp-entry-card {
      background: var(--bg-card);
      border: 1px solid var(--line);
      padding: 14px;
      animation: rowIn 0.35s ease forwards;
    }

    .tp-entry-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .tp-entry-mint {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--cyan);
    }

    .tp-entry-pnl {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
    }

    .tp-progress-row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    .tp-tier-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .tp-tier-bar {
      height: 4px;
      border-radius: 2px;
      background: var(--line-bright);
      overflow: hidden;
      position: relative;
    }

    .tp-tier-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.6s ease;
    }

    .tp-tier-bar-fill.done { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .tp-tier-bar-fill.active { background: var(--amber); box-shadow: 0 0 6px var(--amber); animation: barPulse 1.2s ease-in-out infinite; }
    .tp-tier-bar-fill.wait { background: var(--line-bright); }

    @keyframes barPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .tp-tier-label {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--text-dim);
      text-align: center;
    }

    .tp-tier-label.done  { color: var(--green); }
    .tp-tier-label.active { color: var(--amber); }

    .tp-entry-meta {
      display: flex;
      justify-content: space-between;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-dim);
      border-top: 1px solid var(--line);
      padding-top: 8px;
    }

    /* ================================================================
       LOGS PANEL
    ================================================================ */
    .logs-body {
      padding: 12px;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      max-height: 220px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .log-line {
      display: grid;
      grid-template-columns: 70px 50px 1fr;
      gap: 8px;
      padding: 4px 8px;
      border-left: 2px solid transparent;
      transition: background 0.15s;
    }

    .log-line:hover { background: var(--bg-card); }

    .log-time { color: var(--text-dim); font-size: 0.65rem; }
    .log-lvl  { font-weight: 700; text-transform: uppercase; font-size: 0.65rem; }
    .log-msg  { color: var(--text-secondary); }

    .log-line.info   { border-left-color: #3355ff; }
    .log-line.info   .log-lvl { color: #6688ff; }
    .log-line.warn   { border-left-color: var(--amber); }
    .log-line.warn   .log-lvl { color: var(--amber); }
    .log-line.error  { border-left-color: var(--red); }
    .log-line.error  .log-lvl { color: var(--red); }
    .log-line.success { border-left-color: var(--green); }
    .log-line.success .log-lvl { color: var(--green); }
    .log-line.debug  { border-left-color: var(--text-dim); }
    .log-line.debug  .log-lvl { color: var(--text-dim); }

    /* ================================================================
       SYSTEM PANEL (right col)
    ================================================================ */
    .sys-rows { display: flex; flex-direction: column; }

    .sys-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      border-bottom: 1px solid var(--line);
    }

    .sys-row:last-child { border-bottom: none; }

    .sys-key {
      font-family: var(--font-display);
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .sys-val {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .sys-val.on { color: var(--green); }
    .sys-val.off { color: var(--red); }

    /* ================================================================
       TP TIERS CONFIG (right col)
    ================================================================ */
    .tiers-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 16px 20px;
    }

    .tier-pill {
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: var(--bg-card);
      border: 1px solid var(--line);
      padding: 10px 12px;
      position: relative;
      overflow: hidden;
    }

    .tier-pill::after {
      content: attr(data-n);
      position: absolute;
      right: 8px; top: 4px;
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--line);
      line-height: 1;
    }

    .tier-pill-label {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .tier-pill-val {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--cyan);
    }

    /* ================================================================
       FOOTER
    ================================================================ */
    .footer-bar {
      margin-top: 28px;
      padding: 14px 0;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .footer-info {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.08em;
    }

    .footer-info span { color: var(--text-secondary); }

    /* ================================================================
       EMPTY STATE
    ================================================================ */
    .empty-state {
      padding: 32px;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }

    .empty-state::before {
      content: '[ NO DATA ]';
      display: block;
      color: var(--line-bright);
      font-size: 1rem;
      margin-bottom: 8px;
    }

    /* ================================================================
       SCROLLBAR
    ================================================================ */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg-deep); }
    ::-webkit-scrollbar-thumb { background: var(--line-bright); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--cyan); }

    /* ================================================================
       RESPONSIVE
    ================================================================ */
    @media (max-width: 1000px) {
      .content-grid { grid-template-columns: 1fr; }
      .right-col { order: -1; display: grid; grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 700px) {
      .metrics-row { grid-template-columns: repeat(2, 1fr); }
      .right-col { grid-template-columns: 1fr; }
