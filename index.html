<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SolBot Pro • Terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & Root ─────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --void:     #03050d;
      --deep:     #080d1a;
      --surface:  #0c1424;
      --panel:    #101c32;
      --lift:     #162540;
      --edge:     #1e3357;
      --rim:      #243d66;

      --cyan:     #00e5ff;
      --cyan-dim: #0097aa;
      --cyan-glow:rgba(0,229,255,0.15);
      --cyan-soft:rgba(0,229,255,0.06);

      --green:    #00ff88;
      --green-dim:#00aa5a;
      --green-glow:rgba(0,255,136,0.15);

      --red:      #ff3d6b;
      --red-dim:  #aa2848;
      --red-glow: rgba(255,61,107,0.15);

      --amber:    #ffaa00;
      --amber-glow:rgba(255,170,0,0.12);

      --text:     #e2eeff;
      --text-mid: #8ba3c4;
      --text-dim: #4a6285;

      --font-display: 'Syne', sans-serif;
      --font-mono:    'Space Mono', monospace;

      --r:       8px;
      --r-lg:    14px;
      --sidebar: 240px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-mono);
      background: var(--void);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Animated grid background ─────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,80,160,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Layout ───────────────────────────────────────────────── */
    .layout { display: flex; min-height: 100vh; position: relative; z-index: 1; }

    /* ── Sidebar ──────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar);
      background: linear-gradient(180deg, var(--deep) 0%, var(--surface) 100%);
      border-right: 1px solid var(--edge);
      position: fixed; left: 0; top: 0; bottom: 0;
      display: flex; flex-direction: column;
      padding: 0;
      z-index: 100;
      transition: transform .3s ease;
    }

    .sidebar-top {
      padding: 24px 20px 20px;
      border-bottom: 1px solid var(--edge);
    }

    .brand {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 4px;
    }

    .brand-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--cyan) 0%, #0080ff 100%);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 18px rgba(0,229,255,0.4);
      flex-shrink: 0;
    }

    .brand-text { font-family: var(--font-display); font-weight: 800; font-size: 1.05rem; letter-spacing: .01em; color: var(--text); }
    .brand-sub  { font-size: 0.6rem; color: var(--text-dim); letter-spacing: .15em; text-transform: uppercase; margin-left: 44px; }

    .nav { padding: 16px 12px; flex: 1; }

    .nav-section { font-size: 0.6rem; color: var(--text-dim); letter-spacing: .2em; text-transform: uppercase; padding: 0 8px; margin: 0 0 8px; }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      border-radius: var(--r);
      color: var(--text-mid);
      text-decoration: none;
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      margin-bottom: 2px;
      border: 1px solid transparent;
    }

    .nav-item:hover { background: var(--lift); color: var(--text); border-color: var(--edge); }

    .nav-item.active {
      background: var(--cyan-soft);
      color: var(--cyan);
      border-color: rgba(0,229,255,0.2);
      box-shadow: inset 0 0 20px var(--cyan-glow);
    }

    .nav-icon { font-size: 1rem; width: 18px; text-align: center; flex-shrink: 0; }

    .nav-divider { height: 1px; background: var(--edge); margin: 12px 8px; }

    .sidebar-footer {
      padding: 16px 16px 20px;
      border-top: 1px solid var(--edge);
    }

    .wallet-label { font-size: 0.6rem; color: var(--text-dim); letter-spacing: .15em; text-transform: uppercase; margin-bottom: 6px; }

    .wallet-addr {
      font-size: 0.72rem;
      color: var(--cyan);
      background: var(--cyan-soft);
      border: 1px solid rgba(0,229,255,0.15);
      padding: 6px 10px;
      border-radius: var(--r);
      cursor: pointer;
      transition: all .2s;
      display: block;
      word-break: break-all;
      line-height: 1.4;
    }

    .wallet-addr:hover { background: var(--cyan-glow); border-color: rgba(0,229,255,0.35); }

    /* ── Main content ─────────────────────────────────────────── */
    .main {
      flex: 1;
      margin-left: var(--sidebar);
      padding: 24px 28px;
      display: flex; flex-direction: column; gap: 20px;
      min-height: 100vh;
    }

    /* ── Top bar ──────────────────────────────────────────────── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px;
    }

    .page-title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: -.01em;
      color: var(--text);
    }

    .page-title span { color: var(--cyan); }

    .topbar-right { display: flex; align-items: center; gap: 10px; }

    /* Status pill */
    .status-pill {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 14px;
      background: var(--panel);
      border: 1px solid var(--edge);
      border-radius: 100px;
      font-size: 0.75rem;
      color: var(--text-mid);
    }

    .pulse-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse-anim 2s infinite;
      flex-shrink: 0;
    }

    .pulse-dot.offline { background: var(--red); box-shadow: 0 0 8px var(--red); animation: none; }

    @keyframes pulse-anim {
      0%,100% { opacity: 1; box-shadow: 0 0 8px var(--green); }
      50%      { opacity: .5; box-shadow: 0 0 3px var(--green); }
    }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 16px;
      border-radius: var(--r);
      border: 1px solid transparent;
      font-family: var(--font-display);
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--cyan);
      color: var(--void);
      border-color: var(--cyan);
    }
    .btn-primary:hover { background: #33ecff; box-shadow: 0 0 20px var(--cyan-glow); }

    .btn-ghost {
      background: transparent;
      color: var(--text-mid);
      border-color: var(--edge);
    }
    .btn-ghost:hover { background: var(--lift); color: var(--text); border-color: var(--rim); }

    .btn-success {
      background: var(--green-glow);
      color: var(--green);
      border-color: var(--green-dim);
    }
    .btn-success:hover { background: rgba(0,255,136,0.2); box-shadow: 0 0 16px var(--green-glow); }

    .btn-danger {
      background: var(--red-glow);
      color: var(--red);
      border-color: var(--red-dim);
    }
    .btn-danger:hover { background: rgba(255,61,107,0.2); }

    .btn-sm { padding: 5px 10px; font-size: 0.72rem; }

    /* ── KPI Strip ────────────────────────────────────────────── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .kpi {
      background: var(--panel);
      border: 1px solid var(--edge);
      border-radius: var(--r-lg);
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
      transition: border-color .3s, box-shadow .3s;
    }

    .kpi::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: .4;
    }

    .kpi:hover { border-color: var(--rim); box-shadow: 0 0 30px rgba(0,100,200,0.1); }

    .kpi-label {
      font-size: 0.62rem;
      color: var(--text-dim);
      letter-spacing: .18em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .kpi-value {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.65rem;
      letter-spacing: -.02em;
      color: var(--text);
      line-height: 1;
    }

    .kpi-value.up   { color: var(--green); text-shadow: 0 0 20px var(--green-glow); }
    .kpi-value.down { color: var(--red);   text-shadow: 0 0 20px var(--red-glow); }
    .kpi-value.cyan { color: var(--cyan);  text-shadow: 0 0 20px var(--cyan-glow); }

    .kpi-sub { font-size: 0.68rem; color: var(--text-dim); margin-top: 6px; }

    .kpi-bg-icon {
      position: absolute; right: 16px; top: 50%;
      transform: translateY(-50%);
      font-size: 2.4rem;
      opacity: .06;
      pointer-events: none;
    }

    /* ── Glass card ───────────────────────────────────────────── */
    .card {
      background: var(--panel);
      border: 1px solid var(--edge);
      border-radius: var(--r-lg);
      overflow: hidden;
    }

    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--edge);
      background: linear-gradient(90deg, var(--surface), var(--panel));
    }

    .card-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--text);
      display: flex; align-items: center; gap: 8px;
    }

    .card-title-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
    }

    .card-body { padding: 20px; }

    /* ── Search & Filter bar ──────────────────────────────────── */
    .toolbar {
      display: flex; gap: 10px; align-items: center;
      margin-bottom: 16px; flex-wrap: wrap;
    }

    .search-wrap {
      flex: 1; min-width: 200px;
      position: relative;
    }

    .search-wrap svg {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim); pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 9px 12px 9px 36px;
      background: var(--surface);
      border: 1px solid var(--edge);
      border-radius: var(--r);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      outline: none;
      transition: all .2s;
    }

    .search-input::placeholder { color: var(--text-dim); }
    .search-input:focus { border-color: var(--cyan-dim); box-shadow: 0 0 0 3px var(--cyan-glow); }

    .filter-pills { display: flex; gap: 6px; }

    .pill {
      padding: 6px 14px;
      border-radius: 100px;
      border: 1px solid var(--edge);
      background: transparent;
      color: var(--text-dim);
      font-family: var(--font-display);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }

    .pill:hover  { background: var(--lift); color: var(--text); }
    .pill.active { background: var(--cyan-soft); color: var(--cyan); border-color: rgba(0,229,255,0.3); }

    /* ── Table ────────────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%; border-collapse: collapse;
      font-size: 0.82rem;
    }

    thead tr { border-bottom: 1px solid var(--edge); }

    th {
      padding: 10px 14px;
      text-align: left;
      font-family: var(--font-display);
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--text-dim);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      transition: color .2s;
    }

    th:hover { color: var(--cyan); }
    th.sorted { color: var(--cyan); }

    td {
      padding: 11px 14px;
      border-bottom: 1px solid rgba(30,51,87,0.5);
      vertical-align: middle;
      white-space: nowrap;
    }

    tbody tr { transition: background .15s; }
    tbody tr:hover td { background: var(--lift); }
    tbody tr:last-child td { border-bottom: none; }

    .text-right { text-align: right; }

    /* Token cell */
    .token-cell { display: flex; align-items: center; gap: 10px; }

    .token-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid var(--edge);
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
      transition: border-color .2s;
    }

    tbody tr:hover .token-avatar { border-color: var(--cyan-dim); }

    .token-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .token-symbol { font-family: var(--font-display); font-weight: 700; font-size: 0.88rem; color: var(--text); }
    .token-name   { font-size: 0.68rem; color: var(--text-dim); margin-top: 1px; max-width: 130px; overflow: hidden; text-overflow: ellipsis; }

    /* Address chip */
    .addr-chip {
      font-size: 0.72rem;
      color: var(--cyan);
      background: var(--cyan-soft);
      border: 1px solid rgba(0,229,255,0.12);
      padding: 3px 8px;
      border-radius: 5px;
      cursor: pointer;
      transition: all .2s;
      display: inline-block;
    }

    .addr-chip:hover { background: var(--cyan-glow); border-color: rgba(0,229,255,0.3); }

    /* PnL badge */
    .pnl-badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 4px 9px;
      border-radius: 6px;
      font-size: 0.76rem;
      font-weight: 700;
    }

    .pnl-badge.up  { background: var(--green-glow); color: var(--green); border: 1px solid rgba(0,255,136,0.2); }
    .pnl-badge.dn  { background: var(--red-glow);   color: var(--red);   border: 1px solid rgba(255,61,107,0.2); }
    .pnl-badge.neu { background: var(--cyan-soft);  color: var(--text-dim); border: 1px solid var(--edge); }

    /* Liquidity bar */
    .liq-cell { display: flex; flex-direction: column; gap: 4px; min-width: 90px; }
    .liq-label { font-size: 0.72rem; color: var(--text-mid); }
    .liq-bar-bg { height: 3px; background: var(--edge); border-radius: 2px; overflow: hidden; }
    .liq-bar-fill { height: 100%; background: linear-gradient(90deg, var(--cyan-dim), var(--cyan)); border-radius: 2px; transition: width .5s ease; }

    /* Source badge */
    .src-badge {
      font-size: 0.66rem;
      padding: 2px 7px;
      border-radius: 4px;
      background: var(--lift);
      color: var(--text-mid);
      border: 1px solid var(--edge);
    }

    /* Confidence icon */
    .conf-icon { font-size: .8rem; margin-left: 3px; }

    /* ── Manual tokens add form ───────────────────────────────── */
    .add-form {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr auto;
      gap: 10px;
      margin-bottom: 16px;
    }

    .form-input {
      padding: 9px 12px;
      background: var(--surface);
      border: 1px solid var(--edge);
      border-radius: var(--r);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      outline: none;
      transition: all .2s;
      width: 100%;
    }

    .form-input::placeholder { color: var(--text-dim); }
    .form-input:focus { border-color: var(--cyan-dim); box-shadow: 0 0 0 3px var(--cyan-glow); }

    /* Manual list items */
    .manual-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--edge);
      border-radius: var(--r);
      margin-bottom: 6px;
      transition: border-color .2s;
    }

    .manual-item:hover { border-color: var(--rim); }

    .manual-item-left { display: flex; align-items: center; gap: 10px; }
    .manual-badge { font-size: 0.62rem; padding: 2px 7px; border-radius: 4px; background: var(--amber-glow); color: var(--amber); border: 1px solid rgba(255,170,0,0.25); }

    /* ── States ───────────────────────────────────────────────── */
    .state-box {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 60px 20px; gap: 14px;
    }

    .spinner {
      width: 38px; height: 38px;
      border: 2px solid var(--edge);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .state-title { font-family: var(--font-display); font-weight: 700; color: var(--text-mid); font-size: .9rem; }
    .state-sub   { font-size: .75rem; color: var(--text-dim); }

    /* ── Toast notifications ──────────────────────────────────── */
    .toast-stack {
      position: fixed; bottom: 24px; right: 24px;
      display: flex; flex-direction: column-reverse; gap: 8px;
      z-index: 9999;
    }

    .toast {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      background: var(--panel);
      border: 1px solid var(--edge);
      border-radius: var(--r-lg);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
      animation: toast-in .3s cubic-bezier(0.34,1.56,0.64,1);
      min-width: 270px; max-width: 360px;
      font-size: 0.82rem;
    }

    .toast.ok  { border-left: 3px solid var(--green); }
    .toast.err { border-left: 3px solid var(--red); }
    .toast.inf { border-left: 3px solid var(--cyan); }

    @keyframes toast-in {
      from { transform: translateX(110%) scale(.9); opacity: 0; }
      to   { transform: translateX(0) scale(1); opacity: 1; }
    }

    /* ── Scrollbar ────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--rim); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--cyan-dim); }

    /* ── Footer ───────────────────────────────────────────────── */
    .footer {
      display: flex; justify-content: space-between; align-items: center;
      padding: 18px 0 4px;
      border-top: 1px solid var(--edge);
      font-size: 0.7rem;
      color: var(--text-dim);
    }

    .footer a { color: var(--cyan); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    /* ── Auto-refresh toggle ──────────────────────────────────── */
    .toggle-wrap { display: flex; align-items: center; gap: 8px; font-size: 0.76rem; color: var(--text-mid); }

    .toggle {
      width: 36px; height: 20px;
      background: var(--edge);
      border-radius: 10px;
      cursor: pointer;
      position: relative;
      transition: background .2s;
      border: none; outline: none;
      flex-shrink: 0;
    }

    .toggle.on { background: var(--cyan-dim); box-shadow: 0 0 8px var(--cyan-glow); }

    .toggle::after {
      content: '';
      position: absolute; top: 3px; left: 3px;
      width: 14px; height: 14px;
      background: white;
      border-radius: 50%;
      transition: transform .2s;
    }

    .toggle.on::after { transform: translateX(16px); }

    /* ── Animated number counter ──────────────────────────────── */
    .kpi-value { transition: color .4s; }

    /* ── Responsive ───────────────────────────────────────────── */
    .hamburger {
      display: none;
      background: none; borde
